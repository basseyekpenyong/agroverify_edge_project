name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  flutter-lint-test:
    name: Flutter — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test --coverage

  backend-lint-test:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agroverify
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agroverify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: pip install ruff pytest pytest-asyncio httpx
      - run: ruff check .
      - run: pytest --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://agroverify:password@localhost:5432/agroverify_test
          SECRET_KEY: ci-test-secret

  backend-docker-build:
    name: Backend — Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: agroverify-backend:ci
