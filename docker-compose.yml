version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agroverify_db
    environment:
      POSTGRES_USER: agroverify
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agroverify_edge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroverify"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agroverify_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://agroverify:password@postgres:5432/agroverify_edge
      SECRET_KEY: change-me-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
